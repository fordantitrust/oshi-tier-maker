<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oshi Tier Maker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background:#0d0d1a; color:#dde; font-family:'Segoe UI','Noto Sans Thai','Hiragino Sans',Tahoma,sans-serif; min-height:100vh; padding-bottom:40px; }

/* ── Header ── */
header { text-align:center; padding:32px 16px 20px; }
header h1 { font-size:34px; font-weight:800; letter-spacing:-.5px; background:linear-gradient(135deg,#ff8c8c 0%,#ffb347 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
header p { color:#666; font-size:14px; margin-bottom:12px; }

/* ── Language switcher ── */
.lang-switcher { display:flex; gap:5px; justify-content:center; }
.lang-btn { background:transparent; border:1px solid #2e2e4a; color:#555; padding:3px 11px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:700; letter-spacing:.5px; transition:all .15s; }
.lang-btn:hover { border-color:#ffb347; color:#ffb347; }
.lang-btn.active { background:#ffb347; border-color:#ffb347; color:#0d0d1a; }

/* ── Layout ── */
.container { max-width:1000px; margin:0 auto; padding:0 16px; }

/* ── Storage notice (CF: blue tint) ── */
.storage-notice { display:flex; align-items:flex-start; gap:10px; background:rgba(135,206,235,.07); border:1px solid rgba(135,206,235,.2); border-radius:10px; padding:12px 14px; font-size:13px; color:#888; margin-bottom:20px; }
.storage-notice strong { color:#87ceeb; }
.storage-quota { display:flex; align-items:center; gap:8px; margin-top:6px; }
.quota-bar-wrap { flex:1; height:4px; background:#1e1e38; border-radius:2px; overflow:hidden; }
.quota-bar { height:100%; background:#87ceeb; border-radius:2px; transition:width .4s; }
.quota-bar.warn   { background:#ffb347; }
.quota-bar.danger { background:#ff8c8c; }
.quota-text { font-size:11px; color:#555; white-space:nowrap; }

/* ── Upload zone ── */
.upload-zone { border:2px dashed #2e2e4a; border-radius:14px; padding:36px 20px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; background:#13132b; margin-bottom:20px; user-select:none; }
.upload-zone:hover,.upload-zone.dragover { border-color:#ffb347; background:#18183a; }
.upload-zone input[type="file"] { display:none; }
.upload-icon { font-size:38px; margin-bottom:10px; }
.upload-zone .title { font-size:16px; margin-bottom:4px; }
.upload-zone .hint { color:#555; font-size:13px; }

/* ── Section ── */
.section { margin-bottom:20px; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.section-label { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#666; }

/* ── Photo zones ── */
.photo-zone { display:flex; flex-wrap:wrap; gap:6px; padding:8px; border-radius:8px; min-height:90px; transition:outline .15s; }
.photo-zone.drag-over { outline:2px dashed #ffb347; outline-offset:-2px; }
#pool { background:#13132b; border:1px solid #1e1e38; }
.tier-zone { flex:1; background:rgba(255,255,255,.04); min-height:160px; }
.empty-hint { color:#333; font-size:13px; padding:16px; width:100%; text-align:center; pointer-events:none; align-self:center; }

/* ── Tier container ── */
.tier-container { border:1px solid #1e1e38; border-radius:10px; overflow:hidden; }
.tier-row { display:flex; border-bottom:2px solid rgba(0,0,0,.35); }
#tier-list .tier-row:last-child { border-bottom:none; }

/* ── Tier label ── */
.tier-label { position:relative; width:100px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 6px 18px; min-height:160px; cursor:pointer; transition:filter .15s; }
.tier-label:hover { filter:brightness(1.07); }
.tier-name { font-weight:800; font-size:18px; color:#2a2a2a; text-align:center; text-shadow:0 1px 0 rgba(255,255,255,.3); word-break:break-word; line-height:1.3; padding:3px 4px; border-radius:4px; cursor:text; transition:background .15s; }
.tier-name:hover { background:rgba(0,0,0,.1); }
.tier-name-input { width:88%; background:rgba(255,255,255,.9); border:2px solid rgba(0,0,0,.25); border-radius:4px; padding:3px 5px; font-size:14px; font-weight:700; color:#222; text-align:center; outline:none; }
.btn-del-tier { position:absolute; top:4px; right:4px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,.3); color:#fff; border:none; font-size:13px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s,background .15s; padding:0; }
.tier-row:hover .btn-del-tier { opacity:1; }
.btn-del-tier:hover { background:rgba(220,50,50,.85) !important; }
.color-hint { position:absolute; bottom:5px; font-size:10px; color:rgba(0,0,0,.45); opacity:0; transition:opacity .15s; pointer-events:none; letter-spacing:.3px; }
.tier-row:hover .color-hint { opacity:1; }

/* ── Add tier button ── */
.btn-add-tier { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:11px; background:transparent; border:none; border-top:1px solid #1e1e38; color:#555; font-size:14px; cursor:pointer; transition:color .2s,background .2s; }
.btn-add-tier:hover { color:#ffb347; background:rgba(255,179,71,.06); }

/* ── Color picker popup ── */
.color-picker-popup { position:fixed; display:grid; grid-template-columns:repeat(4,1fr); gap:5px; padding:8px; background:#1a1a30; border:1px solid #2e2e4a; border-radius:10px; z-index:500; box-shadow:0 6px 24px rgba(0,0,0,.65); }
.color-swatch { width:30px; height:30px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:border-color .12s,transform .1s; }
.color-swatch:hover { transform:scale(1.18); border-color:rgba(255,255,255,.5); }
.color-swatch.selected { border-color:#fff; }

/* ── Photo thumbnails ── */
.photo-item { position:relative; width:100px; height:130px; border-radius:5px; overflow:hidden; cursor:grab; flex-shrink:0; background:#1e1e38; transition:transform .12s,box-shadow .12s; }
.photo-item:hover { transform:scale(1.04); box-shadow:0 4px 16px rgba(0,0,0,.5); }
.photo-item:active { cursor:grabbing; transform:scale(1.02); }
.photo-item img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
.photo-item .btn-remove { position:absolute; top:3px; right:3px; width:22px; height:22px; border-radius:50%; background:rgba(0,0,0,.75); color:#fff; border:none; font-size:15px; line-height:22px; text-align:center; cursor:pointer; opacity:0; transition:opacity .15s; padding:0; }
.photo-item:hover .btn-remove { opacity:1; }
.photo-item.is-loading { display:flex; align-items:center; justify-content:center; font-size:26px; animation:pulse 1s ease-in-out infinite alternate; }
@keyframes pulse { from{opacity:.5} to{opacity:1} }

/* ── Oshi profile ── */
.oshi-name-bar { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.65); padding:2px 5px 3px; display:flex; align-items:center; gap:3px; min-height:21px; border-radius:0 0 5px 5px; }
.oshi-name { color:#fff; font-size:10px; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; cursor:text; line-height:1.4; }
.oshi-name-input { flex:1; background:transparent; border:none; border-bottom:1px solid #ffb347; padding:0; font-size:10px; color:#fff; outline:none; min-width:0; font-weight:600; }
.btn-rename-oshi { position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:rgba(0,0,0,.75); color:#dde; border:none; font-size:11px; line-height:22px; text-align:center; cursor:pointer; opacity:0; transition:opacity .15s; padding:0; }
.photo-item:hover .btn-rename-oshi { opacity:1; }
.btn-rename-oshi:hover { background:rgba(255,179,71,.85) !important; color:#0d0d1a; }
.btn-update-photo { flex-shrink:0; width:18px; height:18px; border-radius:50%; background:rgba(255,255,255,.18); color:#fff; border:none; font-size:10px; line-height:18px; text-align:center; cursor:pointer; opacity:0; transition:opacity .15s; padding:0; }
.photo-item:hover .btn-update-photo { opacity:1; }
.btn-update-photo:hover { background:rgba(255,179,71,.85) !important; }

/* ── Buttons ── */
.btn-sm { background:transparent; border:1px solid #2e2e4a; color:#666; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:12px; transition:all .2s; white-space:nowrap; }
.btn-sm:hover { border-color:#ff8c8c; color:#ff8c8c; }
.btn-generate { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:16px; background:linear-gradient(135deg,#ff8c8c 0%,#ffb347 100%); border:none; border-radius:12px; color:#fff; font-size:18px; font-weight:700; cursor:pointer; margin-top:24px; transition:opacity .2s,transform .1s; letter-spacing:.3px; }
.btn-generate:hover { opacity:.9; transform:translateY(-1px); }
.btn-generate:active { transform:translateY(0); }
.btn-generate:disabled { opacity:.5; cursor:not-allowed; transform:none; }

/* ── Per-row selector ── */
.perrow-group { display:flex; align-items:center; gap:10px; background:#13132b; border:1px solid #1e1e38; border-radius:10px; padding:12px 16px; margin-top:20px; }
.perrow-group > label { font-size:14px; color:#aaa; white-space:nowrap; }
.perrow-pills { display:flex; gap:6px; flex-wrap:wrap; }
.perrow-pills input[type="radio"] { display:none; }
.perrow-pills label { display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:8px; border:1px solid #2e2e4a; background:#0d0d1a; color:#888; font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; user-select:none; }
.perrow-pills input[type="radio"]:checked + label { background:linear-gradient(135deg,#ff8c8c,#ffb347); border-color:transparent; color:#fff; }
.perrow-pills label:hover { border-color:#ffb347; color:#ffb347; }

/* ── Save status ── */
.save-status { font-size:12px; color:#555; opacity:0; transition:opacity .3s; white-space:nowrap; }
.save-status.visible { opacity:1; }

/* ── Loading overlay ── */
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:999; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
#overlay.active { display:flex; }
#overlay p { color:#aaa; font-size:14px; }
.spinner { width:50px; height:50px; border:4px solid #2e2e4a; border-top-color:#ffb347; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── Toast ── */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1e1e38; border:1px solid #ff8c8c; color:#ff8c8c; padding:10px 22px; border-radius:8px; font-size:14px; transition:transform .25s; z-index:1000; white-space:nowrap; }
#toast.show { transform:translateX(-50%) translateY(0); }

/* ── Footer ── */
footer { text-align:center; padding:24px 16px 16px; }
footer a { color:#2e2e4a; font-size:12px; text-decoration:none; transition:color .15s; }
footer a:hover { color:#ffb347; }

/* ── Help banner ── */
.help-banner { display:flex; align-items:center; justify-content:space-between; gap:12px; background:rgba(255,179,71,.07); border:1px solid rgba(255,179,71,.18); border-radius:10px; padding:10px 16px; margin-bottom:20px; cursor:pointer; transition:background .2s,border-color .2s; }
.help-banner:hover { background:rgba(255,179,71,.13); border-color:rgba(255,179,71,.35); }
.help-banner-text { font-size:13px; color:#999; }
.help-banner-text strong { color:#ffb347; font-weight:600; }
.help-banner-arrow { font-size:16px; color:#666; flex-shrink:0; transition:color .2s,transform .2s; }
.help-banner:hover .help-banner-arrow { color:#ffb347; transform:translateX(3px); }

/* ── Help modal ── */
.help-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:800; align-items:center; justify-content:center; padding:16px; }
.help-backdrop.open { display:flex; }
.help-modal { background:#13132b; border:1px solid #2e2e4a; border-radius:14px; padding:24px 26px; width:100%; max-width:540px; max-height:82vh; overflow-y:auto; position:relative; }
.help-modal::-webkit-scrollbar { width:4px; }
.help-modal::-webkit-scrollbar-thumb { background:#2e2e4a; border-radius:2px; }
.help-title { font-size:17px; font-weight:700; color:#eee; margin-bottom:20px; }
.help-close { position:absolute; top:14px; right:14px; width:28px; height:28px; border-radius:7px; background:transparent; border:1px solid #2e2e4a; color:#666; font-size:16px; cursor:pointer; line-height:1; transition:all .15s; }
.help-close:hover { border-color:#ff8c8c; color:#ff8c8c; }
.help-section { margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid #1e1e38; }
.help-section:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
.help-section h3 { font-size:13px; font-weight:700; color:#ffb347; margin-bottom:8px; }
.help-section li { font-size:13px; color:#999; padding:3px 0 3px 14px; position:relative; list-style:none; line-height:1.5; }
.help-section li::before { content:'·'; position:absolute; left:4px; color:#555; }
.help-section li strong { color:#ccc; font-weight:600; }
.help-kbd { display:inline-block; background:#1e1e38; border:1px solid #2e2e4a; border-radius:4px; padding:0 5px; font-size:11px; color:#aaa; font-family:monospace; line-height:1.6; }
.help-tip { margin-top:10px; padding:8px 12px; background:rgba(255,179,71,.07); border:1px solid rgba(255,179,71,.2); border-radius:8px; font-size:12px; color:#888; }
</style>
</head>
<body>

<header>
    <h1>✦ Oshi Tier Maker</h1>
    <p id="h-subtitle"></p>
    <div class="lang-switcher">
        <button class="lang-btn" data-lang="th">TH</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="jp">JP</button>
    </div>
</header>

<div class="container">

    <!-- Help banner -->
    <div id="btn-help" class="help-banner" role="button" tabindex="0">
        <span id="help-banner-text" class="help-banner-text"></span>
        <span class="help-banner-arrow">›</span>
    </div>

    <!-- Storage notice (CF: blue, with quota bar) -->
    <div class="storage-notice">
        <div style="flex:1">
            <div id="storage-notice-text"></div>
            <div class="storage-quota">
                <div class="quota-bar-wrap"><div class="quota-bar" id="quota-bar" style="width:0%"></div></div>
                <span class="quota-text" id="quota-text"></span>
            </div>
        </div>
    </div>

    <!-- Upload zone -->
    <div id="upload-zone" class="upload-zone">
        <input type="file" id="file-input" multiple accept="image/jpeg,image/png,image/gif,image/webp">
        <div class="upload-icon">🖼️</div>
        <p id="upload-title" class="title"></p>
        <p id="upload-hint" class="hint"></p>
    </div>

    <!-- Pool -->
    <div class="section">
        <div class="section-header">
            <span id="pool-label" class="section-label"></span>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <span id="save-status" class="save-status"></span>
                <button id="btn-export" class="btn-sm">📦 Export</button>
                <label class="btn-sm" style="cursor:pointer;"><span id="import-label-text"></span><input type="file" id="import-input" accept=".zip" style="display:none"></label>
                <button id="btn-clear-all" class="btn-sm"></button>
            </div>
        </div>
        <div id="pool" class="photo-zone"></div>
    </div>

    <!-- Tier list -->
    <div class="section">
        <div class="section-header">
            <span class="section-label">Tier List</span>
            <span id="tier-list-hint" style="font-size:11px;color:#444;"></span>
        </div>
        <div class="tier-container">
            <div id="tier-list"></div>
            <button id="btn-add-tier" class="btn-add-tier"></button>
        </div>
    </div>

    <!-- Per-row -->
    <div class="perrow-group">
        <label id="perrow-label"></label>
        <div class="perrow-pills">
            <input type="radio" name="perrow" id="pr3" value="3"><label for="pr3">3</label>
            <input type="radio" name="perrow" id="pr4" value="4"><label for="pr4">4</label>
            <input type="radio" name="perrow" id="pr5" value="5"><label for="pr5">5</label>
            <input type="radio" name="perrow" id="pr6" value="6" checked><label for="pr6">6</label>
            <input type="radio" name="perrow" id="pr7" value="7"><label for="pr7">7</label>
            <input type="radio" name="perrow" id="pr8" value="8"><label for="pr8">8</label>
        </div>
    </div>

    <button id="btn-generate" class="btn-generate"><span>🎨</span><span id="btn-generate-text"></span></button>

</div>

<div id="overlay"><div class="spinner"></div><p id="overlay-msg"></p></div>
<div id="toast"></div>
<footer><a href="https://github.com/fordantitrust/oshi-tier-maker" target="_blank" rel="noopener">v0.5.0rc1 · GitHub ↗</a></footer>

<!-- Help modal -->
<div id="help-backdrop" class="help-backdrop">
<div class="help-modal">
    <button id="help-close" class="help-close">×</button>
    <div id="help-content"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
(function () {
'use strict';

// ── i18n ──────────────────────────────────────────────────────────────────────
const LANG_KEY = 'oshi-tier-lang';
let currentLang = localStorage.getItem(LANG_KEY) || 'th';

const I18N = {
  th: {
    subtitle:        'อัพโหลดรูป → ลากจัด tier → สร้างภาพ PNG',
    helpBanner:      '<strong>📖 คู่มือการใช้งาน</strong> &nbsp;·&nbsp; วิธีอัพโหลด · Oshi Profile · จัด tier · สร้างภาพ PNG · Export/Import',
    storageNotice:   '🖥️&nbsp; รูปทั้งหมด<strong>บันทึกในเบราว์เซอร์ของคุณเท่านั้น</strong> — ไม่มีข้อมูลใดส่งออกไปยังเซิร์ฟเวอร์',

    toastImportOver: (u,m) => `Import จะใช้พื้นที่เกิน ${m} MB — กรุณาล้างข้อมูลก่อน`,

function t(key, ...args) {
    const val = (I18N[currentLang] ?? I18N.th)[key] ?? I18N.th[key] ?? key;
    return typeof val === 'function' ? val(...args) : val;
}

function applyLang() {
    document.documentElement.lang = { th:'th', en:'en', jp:'ja' }[currentLang] || 'th';
    document.getElementById('h-subtitle').textContent          = t('subtitle');
    document.getElementById('help-banner-text').innerHTML      = t('helpBanner');
    document.getElementById('storage-notice-text').innerHTML   = t('storageNotice');
    document.getElementById('upload-title').textContent        = t('uploadTitle');
    document.getElementById('upload-hint').textContent         = t('uploadHint');
    document.getElementById('pool-label').textContent          = t('poolLabel');
    document.getElementById('import-label-text').textContent   = t('importLabel');
    document.getElementById('btn-clear-all').textContent       = t('btnClearAll');
    document.getElementById('tier-list-hint').innerHTML        = t('tierListHint');
    document.getElementById('btn-add-tier').textContent        = t('btnAddTier');
    document.getElementById('perrow-label').textContent        = t('perRowLabel');
    document.getElementById('btn-generate-text').textContent   = t('btnGenerate');
    const qtEl = document.getElementById('quota-text');
    if (qtEl && !qtEl.dataset.hasValue) qtEl.textContent = t('quotaChecking');
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    const hint = pool.querySelector('.empty-hint');
    if (hint) hint.textContent = t('poolHint');
    document.querySelectorAll('.color-hint').forEach(el => el.textContent = t('colorHint'));
    const hc = document.getElementById('help-content');
    if (hc) hc.innerHTML = buildHelpContent();
    localStorage.setItem(LANG_KEY, currentLang);
}

function buildHelpContent() {
    const h = HELP[currentLang] || HELP.th;

        ).join('');
}

// ── IndexedDB wrapper ─────────────────────────────────────────────────────────
const idb = (() => {
    let _db = null;
    function open() {
        if (_db) return Promise.resolve(_db);
        return new Promise((res, rej) => {
            const req = indexedDB.open(IDB_NAME, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE, { keyPath:'id' });
            req.onsuccess  = e => { _db = e.target.result; res(_db); };
            req.onerror    = e => rej(e.target.error);
        });
    }
    function tx(mode, fn) {
        return open().then(db => new Promise((res, rej) => {
            const req = fn(db.transaction(IDB_STORE, mode).objectStore(IDB_STORE));
            req.onsuccess = e => res(e.target.result);
            req.onerror   = e => rej(e.target.error);
        }));
    }
    return {
        put(id, blob)  { return tx('readwrite', s => s.put({ id, blob })); },
        get(id)        { return tx('readonly',  s => s.get(id)).then(r => r?.blob ?? null); },
        delete(id)     { return tx('readwrite', s => s.delete(id)); },
        clear()        { return tx('readwrite', s => s.clear()); },
        getAll()       { return tx('readonly',  s => s.getAll()); },
        async totalSize() { const all = await this.getAll(); return all.reduce((s, r) => s + (r.blob?.size ?? 0), 0); },
    };
})();

async function getBlobUrl(photoId) {
    if (blobUrls.has(photoId)) return blobUrls.get(photoId);
    const blob = await idb.get(photoId);
    if (!blob) throw new Error('Image not found: ' + photoId);
    const url = URL.createObjectURL(blob);
    blobUrls.set(photoId, url);
    return url;
}
function revokeBlobUrl(photoId) { const u = blobUrls.get(photoId); if(u){ URL.revokeObjectURL(u); blobUrls.delete(photoId); } }

// ── Quota check ───────────────────────────────────────────────────────────────
async function updateQuota() {
    try {
        const usedBytes = await idb.totalSize();
        const usedMB    = usedBytes / 1024 / 1024;
        const pct       = Math.min(100, (usedMB / QUOTA_LIMIT_MB) * 100);
        const bar  = document.getElementById('quota-bar');
        const text = document.getElementById('quota-text');
        bar.style.width = pct.toFixed(1) + '%';
        bar.className   = 'quota-bar' + (usedMB >= QUOTA_LIMIT_MB ? ' danger' : usedMB >= QUOTA_WARN_MB ? ' warn' : '');
        const uStr = usedMB < 0.1 ? '< 0.1' : usedMB.toFixed(1);
        text.textContent = t('quotaOf', uStr, QUOTA_LIMIT_MB);
        text.dataset.hasValue = '1';
        if (usedMB >= QUOTA_LIMIT_MB) showToast(t('toastStoreFull', uStr, QUOTA_LIMIT_MB));
        else if (usedMB >= QUOTA_WARN_MB) showToast(t('toastStoreWarn', uStr, QUOTA_LIMIT_MB));
    } catch { document.getElementById('quota-text').textContent = '—'; }
}

    });
    document.querySelectorAll('input[name="perrow"]').forEach(r => r.addEventListener('change', saveState));
    document.addEventListener('click', () => closeColorPicker());

    const restored = await restoreState();
    if (!restored) tiersConfig.forEach(renderTierRow);
    updateQuota();

    const helpBackdrop = document.getElementById('help-backdrop');
    const btnHelp = document.getElementById('btn-help');
    btnHelp.addEventListener('click', e => { e.stopPropagation(); helpBackdrop.classList.add('open'); });
    btnHelp.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); helpBackdrop.classList.add('open'); } });
    document.getElementById('help-close').addEventListener('click', () => helpBackdrop.classList.remove('open'));
    helpBackdrop.addEventListener('click', e => { if(e.target===helpBackdrop) helpBackdrop.classList.remove('open'); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') helpBackdrop.classList.remove('open'); });
}

// ── Tier management ───────────────────────────────────────────────────────────
function addTier() {
    const used  = new Set(tiersConfig.map(x => x.color));
    const color = PALETTE.find(c => !used.has(c)) ?? PALETTE[tiersConfig.length % PALETTE.length];
    const tier  = { id:'tier-'+Date.now(), name:t('defaultTierName', tiersConfig.length+1), color };
    tiersConfig.push(tier);
    const { nameSpan } = renderTierRow(tier);
    saveState();
    startInlineEdit(tier, nameSpan);
}

async function deleteTier(id) {
    if (tiersConfig.length <= 1) { showToast(t('toastMinOneTier')); return; }
    const zone   = document.getElementById('zone-'+id);
    const photos = zone ? [...zone.querySelectorAll('.photo-item')] : [];
    if (photos.length > 0 && !confirm(t('confirmDelTier', photos.length))) return;
    photos.forEach(p => appendPhoto(pool, p));
    tiersConfig = tiersConfig.filter(x => x.id !== id);
    document.querySelector(`.tier-row[data-tier-id="${id}"]`)?.remove();
    syncPoolHint(); saveState();
}

function renderTierRow(tier) {
    const row = document.createElement('div');
    row.className = 'tier-row'; row.dataset.tierId = tier.id;

    const label = document.createElement('div');
    label.className = 'tier-label'; label.style.background = tier.color;
    label.addEventListener('click', e => { if(e.target===label||e.target===colorHint) showColorPicker(tier,label,e); });

    const nameSpan = document.createElement('span');
    nameSpan.className = 'tier-name'; nameSpan.textContent = tier.name;
    nameSpan.addEventListener('click', e => { e.stopPropagation(); startInlineEdit(tier, nameSpan); });

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-del-tier'; delBtn.type = 'button'; delBtn.textContent = '×'; delBtn.title = t('delTierTitle');
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteTier(tier.id); });

    const colorHint = document.createElement('span');
    colorHint.className = 'color-hint'; colorHint.textContent = t('colorHint');

    label.append(nameSpan, delBtn, colorHint);

    const zone = document.createElement('div');
    zone.className = 'photo-zone tier-zone'; zone.id = 'zone-'+tier.id; setupZoneDrop(zone);

    row.append(label, zone);
    tierListEl.appendChild(row);
    return { row, label, nameSpan, zone };
}

function startInlineEdit(tier, nameSpan) {
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'tier-name-input';
    input.value = tier.name; input.maxLength = 24;
    const commit = () => { const v=input.value.trim(); if(v) tier.name=v; nameSpan.textContent=tier.name; input.replaceWith(nameSpan); saveState(); };
    input.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape') input.replaceWith(nameSpan); });
    input.addEventListener('blur', commit);
    input.addEventListener('click', e => e.stopPropagation());
    nameSpan.replaceWith(input); input.focus(); input.select();
}

// ── Color picker ──────────────────────────────────────────────────────────────
function showColorPicker(tier, labelEl, ev) {
    ev?.stopPropagation(); closeColorPicker();
    const picker = document.createElement('div'); picker.className = 'color-picker-popup';
    PALETTE.forEach(color => {
        const sw = document.createElement('div');
        sw.className = 'color-swatch'+(color===tier.color?' selected':''); sw.style.background=color;
        sw.addEventListener('click', e => { e.stopPropagation(); tier.color=color; labelEl.style.background=color; closeColorPicker(); saveState(); });
        picker.appendChild(sw);
    });
    document.body.appendChild(picker); colorPicker = picker;
    const r = labelEl.getBoundingClientRect();
    picker.style.top = (r.bottom+4)+'px'; picker.style.left = r.left+'px';
}
function closeColorPicker() { colorPicker?.remove(); colorPicker=null; }

// ── Drop zones ────────────────────────────────────────────────────────────────
function setupZoneDrop(zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); if(draggedEl) zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); if(draggedEl){ appendPhoto(zone,draggedEl); saveState(); } });
}

// ── Upload → IndexedDB → create oshi ─────────────────────────────────────────
function setupUploadZone() {
    const uz = document.getElementById('upload-zone'), fi = document.getElementById('file-input');
    uz.addEventListener('click', () => fi.click());
    fi.addEventListener('change', e => { processFiles(e.target.files); fi.value=''; });
    uz.addEventListener('dragenter', e => e.preventDefault());
    uz.addEventListener('dragover', e => { e.preventDefault(); if(!draggedEl) uz.classList.add('dragover'); });
    uz.addEventListener('dragleave', () => uz.classList.remove('dragover'));
    uz.addEventListener('drop', e => { e.preventDefault(); uz.classList.remove('dragover'); if(e.dataTransfer.files.length) processFiles(e.dataTransfer.files); });
}
function processFiles(files) { Array.from(files).forEach(f => { if(/^image\/(jpeg|png|gif|webp)$/.test(f.type)) storeFile(f); }); }

async function storeFile(file) {
    const usedBytes = await idb.totalSize();
    if (usedBytes + file.size > QUOTA_LIMIT_MB * 1024 * 1024) {
        const u = (usedBytes/1024/1024).toFixed(1);
        showToast(t('toastStoreFull', u, QUOTA_LIMIT_MB)); return;
    }
    const ph = makeLoadingEl(); appendPhoto(pool, ph);
    try {
        const ext     = mimeToExt(file.type);
        const photoId = crypto.randomUUID() + '.' + ext;
        const oshiId  = 'oshi-' + crypto.randomUUID();
        const oshi    = { id: oshiId, name: '', photo: photoId };
        await idb.put(photoId, file);
        const url = URL.createObjectURL(file);
        blobUrls.set(photoId, url);
        oshisMap.set(oshiId, oshi);
        ph.replaceWith(makeOshiEl(oshi, url));
        saveState(); updateQuota();
    } catch(e) { ph.remove(); showToast(t('toastStoreErr', e.message)); }
}

// ── Oshi element factory ──────────────────────────────────────────────────────
function makeLoadingEl() { const d=document.createElement('div'); d.className='photo-item is-loading'; d.textContent='⏳'; return d; }

function makeOshiEl(oshi, photoUrl) {
    const div = document.createElement('div');
    div.className = 'photo-item'; div.draggable = true; div.dataset.oshiId = oshi.id;

    const img = document.createElement('img'); img.src = photoUrl; img.alt = ''; img.draggable = false;
    img.addEventListener('error', async () => {
        try { const url = await getBlobUrl(oshi.photo); img.src = url; }
        catch { await removeOshi(div, oshi); }
    });

    // Remove button (top-right)
    const btnRemove = document.createElement('button');
    btnRemove.className = 'btn-remove'; btnRemove.type = 'button'; btnRemove.textContent = '×'; btnRemove.title = t('removePhotoTitle');
    btnRemove.addEventListener('click', async e => { e.stopPropagation(); await removeOshi(div, oshi); });

    // Rename button (top-left)
    const btnRename = document.createElement('button');
    btnRename.className = 'btn-rename-oshi'; btnRename.type = 'button'; btnRename.textContent = '✎'; btnRename.title = t('renameOshiTitle');
    btnRename.addEventListener('click', e => { e.stopPropagation(); startOshiRename(oshi, nameEl); });

    // Name bar (bottom overlay)
    const nameBar = document.createElement('div'); nameBar.className = 'oshi-name-bar';
    const nameEl  = document.createElement('span'); nameEl.className = 'oshi-name'; nameEl.textContent = oshi.name;
    nameEl.addEventListener('click', e => { e.stopPropagation(); startOshiRename(oshi, nameEl); });

    // Update photo button (inside name bar, right side)
    const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/jpeg,image/png,image/gif,image/webp'; fileInput.style.display = 'none';
    fileInput.addEventListener('change', async e => { if(e.target.files[0]) await updateOshiPhoto(oshi, img, e.target.files[0]); fileInput.value = ''; });

    const btnUpdatePhoto = document.createElement('button');
    btnUpdatePhoto.className = 'btn-update-photo'; btnUpdatePhoto.type = 'button'; btnUpdatePhoto.textContent = '📷'; btnUpdatePhoto.title = t('updatePhotoTitle');
    btnUpdatePhoto.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });

    nameBar.append(nameEl, btnUpdatePhoto);
    div.append(img, btnRemove, btnRename, nameBar, fileInput);

    div.addEventListener('dragstart', e => { draggedEl=div; e.dataTransfer.effectAllowed='move'; requestAnimationFrame(()=>div.style.opacity='.4'); });
    div.addEventListener('dragend', () => { div.style.opacity=''; draggedEl=null; });
    return div;
}

// ── Oshi operations ───────────────────────────────────────────────────────────
async function removeOshi(div, oshi) {
    div.remove(); syncPoolHint();
    revokeBlobUrl(oshi.photo);
    await idb.delete(oshi.photo);
    oshisMap.delete(oshi.id);
    saveState(); updateQuota();
}

async function updateOshiPhoto(oshi, imgEl, file) {
    const usedBytes = await idb.totalSize();
    if (usedBytes + file.size > QUOTA_LIMIT_MB * 1024 * 1024) {
        showToast(t('toastStoreFull', (usedBytes/1024/1024).toFixed(1), QUOTA_LIMIT_MB)); return;
    }
    try {
        const ext        = mimeToExt(file.type);
        const newPhotoId = crypto.randomUUID() + '.' + ext;
        await idb.put(newPhotoId, file);
        const url = URL.createObjectURL(file);
        blobUrls.set(newPhotoId, url);
        // Clean up old photo
        const oldPhotoId = oshi.photo;
        revokeBlobUrl(oldPhotoId);
        await idb.delete(oldPhotoId);
        // Update oshi in place (no DOM move)
        oshi.photo = newPhotoId;
        imgEl.src  = url;
        saveState(); updateQuota();
    } catch(e) { showToast(t('toastStoreErr', e.message)); }
}

function startOshiRename(oshi, nameEl) {
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'oshi-name-input';
    input.value = oshi.name; input.maxLength = 20; input.placeholder = t('oshiNamePlaceholder');
    const commit = () => {
        oshi.name = input.value.trim();
        nameEl.textContent = oshi.name;
        input.replaceWith(nameEl);
        saveState();
    };
    input.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape') input.replaceWith(nameEl); });
    input.addEventListener('blur', commit);
    input.addEventListener('click', e => e.stopPropagation());
    nameEl.replaceWith(input); input.focus(); input.select();
}

// ── Pool helpers ──────────────────────────────────────────────────────────────
function appendPhoto(zone, el) { zone.querySelectorAll('.empty-hint').forEach(h=>h.remove()); zone.appendChild(el); if(zone===pool) syncPoolHint(); }
function syncPoolHint() {
    if (!pool.querySelector('.photo-item') && !pool.querySelector('.empty-hint')) {
        const p = document.createElement('p'); p.className='empty-hint'; p.textContent=t('poolHint'); pool.appendChild(p);
    }
}
function collectOshiIds(zone) { return zone ? [...zone.querySelectorAll('.photo-item[data-oshi-id]')].map(el=>el.dataset.oshiId) : []; }
function getAllPhotoIds(state) {
    if (state.oshis) return [...new Set(state.oshis.map(o => o.photo))];
    return [...new Set([...(state.pool??[]),...(state.tiers??[]).flatMap(x=>x.files??[])])];
}

// ── Clear all ─────────────────────────────────────────────────────────────────
async function onClearAll() {
    const total = document.querySelectorAll('.photo-item').length;
    if(!total) return;
    if(!confirm(t('confirmClearAll', total))) return;
    document.querySelectorAll('.photo-item').forEach(el=>el.remove());
    syncPoolHint();
    blobUrls.forEach(url => URL.revokeObjectURL(url)); blobUrls.clear();
    oshisMap.clear();
    await idb.clear();
    clearSavedState(); updateQuota();
}

// ── Generate PNG ──────────────────────────────────────────────────────────────
async function onGenerate() {
    const tiers = tiersConfig.map(x => {
        const oshiIds = collectOshiIds(document.getElementById('zone-'+x.id));
        const photos  = oshiIds.map(id => oshisMap.get(id)?.photo).filter(Boolean);
        return { name:x.name, color:x.color, files:photos };
    }).filter(x=>x.files.length>0);
    if(!tiers.length) { showToast(t('toastNeedPhotos')); return; }
    const perRow = parseInt(document.querySelector('input[name="perrow"]:checked').value, 10);
    showOverlay(t('ovGenerating'));
    document.getElementById('btn-generate').disabled = true;
    try {
        const canvas = await buildTierCanvas(tiers, perRow, id => getBlobUrl(id));
        const blob   = await canvasToBlob(canvas);
        dlBlob(blob, 'oshi-tier.png');
    } catch(e) { showToast(t('toastGenFail', e.message)); }
    finally { hideOverlay(); document.getElementById('btn-generate').disabled = false; }
}

// ── Export ZIP ────────────────────────────────────────────────────────────────
async function onExport() {
    const state = JSON.parse(localStorage.getItem(STORAGE_KEY) ?? 'null');
    const ids   = state ? getAllPhotoIds(state) : [];
    if(!ids.length) { showToast(t('toastNoExport')); return; }
    showOverlay(t('ovExporting',0,ids.length));
    try {
        const zip = new JSZip(); zip.file('state.json', JSON.stringify(state,null,2));
        const imgs = zip.folder('images');
        for(const [i,id] of ids.entries()) {
            overlayMsg.textContent = t('ovExporting',i+1,ids.length);
            const blob = await idb.get(id); if(blob) imgs.file(id, blob);
        }
        const content = await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
        dlBlob(content,'oshi-tier-export.zip'); showToast(t('toastExportOk'));
    } catch(e) { showToast(t('toastExportFail', e.message)); }
    finally { hideOverlay(); }
}

// ── Import ZIP ────────────────────────────────────────────────────────────────
async function onImport(file) {
    showOverlay(t('ovReading'));
    try {
        const zip = await JSZip.loadAsync(file);
        const stateFile = zip.file('state.json'); if(!stateFile) throw new Error(t('errNoState'));
        const state = JSON.parse(await stateFile.async('string'));
        const imgFolder = zip.folder('images'); if(!imgFolder) throw new Error(t('errNoImages'));

        // Quota check
        const existingBytes = await idb.totalSize();
        let importBytes = 0; const uploads = [];
        imgFolder.forEach((path,f)=>{ if(!f.dir) uploads.push([path.split('/').pop(),f]); });
        for(const [,f] of uploads){ const b=await f.async('arraybuffer'); importBytes+=b.byteLength; }
        if(existingBytes+importBytes > QUOTA_LIMIT_MB*1024*1024) {
            const u = ((existingBytes+importBytes)/1024/1024).toFixed(1);
            throw new Error(t('toastImportOver', u, QUOTA_LIMIT_MB));
        }

        for(const [i,[id,zipFile]] of uploads.entries()) {
            overlayMsg.textContent = t('ovSaving',i+1,uploads.length);
            const blob = await zipFile.async('blob');
            await idb.put(id, blob);
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        showToast(t('toastImportOk'));
        setTimeout(()=>location.reload(), 900);
    } catch(e) { showToast(t('toastImportFail', e.message)); hideOverlay(); }
}

// ── Canvas generation ─────────────────────────────────────────────────────────
async function buildTierCanvas(tiers, perRow, getSrc) {
    const {LW,PW,PH,G} = CANVAS_CFG;
    const th = n => Math.max(1,Math.ceil(n/perRow))*PH+(Math.max(1,Math.ceil(n/perRow))+1)*G;
    const W  = LW+perRow*PW+(perRow+1)*G;
    const H  = tiers.reduce((s,x)=>s+th(x.files.length),0);
    const canvas = document.createElement('canvas'); canvas.width=W; canvas.height=H;
    const ctx = canvas.getContext('2d');
    let y=0;
    for(const tier of tiers) {
        const h=th(tier.files.length);
        ctx.fillStyle=tier.color; ctx.fillRect(0,y,W,h);
        ctx.save(); ctx.fillStyle='rgba(0,0,0,0.65)';
        ctx.font='bold 20px "Segoe UI","Noto Sans Thai","Hiragino Sans",Arial,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        drawWrappedText(ctx, tier.name, LW/2, y+h/2, LW-10, 26);
        ctx.restore();
        for(let i=0;i<tier.files.length;i++) {
            const row=Math.floor(i/perRow),col=i%perRow;
            const px=LW+G+col*(PW+G),py=y+G+row*(PH+G);
            try { const src=await getSrc(tier.files[i]); const img=await loadImg(src); const {sx,sy,sW,sH}=coverCrop(img.naturalWidth,img.naturalHeight,PW,PH); ctx.drawImage(img,sx,sy,sW,sH,px,py,PW,PH); } catch {}
        }
        y+=h;
    }
    return canvas;
}
function drawWrappedText(ctx,text,cx,cy,maxW,lineH) {
    if(ctx.measureText(text).width<=maxW){ctx.fillText(text,cx,cy);return;}
    const words=text.split(' '),lines=[];let cur='';
    for(const w of words){const tt=cur?cur+' '+w:w;if(ctx.measureText(tt).width>maxW&&cur){lines.push(cur);cur=w;}else cur=tt;}
    if(cur)lines.push(cur);
    const sy=cy-(lines.length-1)*lineH/2; lines.forEach((l,i)=>ctx.fillText(l,cx,sy+i*lineH));
}
function loadImg(src){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src;});}
function coverCrop(sw,sh,dw,dh){const sr=sw/sh,dr=dw/dh;if(sr>dr){const sW=Math.round(sh*dr);return{sx:Math.round((sw-sW)/2),sy:0,sW,sH:sh};}else{const sH=Math.round(sw/dr);return{sx:0,sy:Math.round((sh-sH)/2),sW:sw,sH};}}
function canvasToBlob(canvas){return new Promise((res,rej)=>canvas.toBlob(b=>b?res(b):rej(new Error('toBlob failed')),'image/png'));}
function dlBlob(blob,name){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000);}
function mimeToExt(mime){return({'image/jpeg':'jpg','image/png':'png','image/gif':'gif','image/webp':'webp'})[mime]??'jpg';}

// ── Overlay ───────────────────────────────────────────────────────────────────
function showOverlay(msg){overlayMsg.textContent=msg;overlay.classList.add('active');}
function hideOverlay(){overlay.classList.remove('active');}

// ── Persistence ───────────────────────────────────────────────────────────────
function saveState() {
    const perRowEl = document.querySelector('input[name="perrow"]:checked');
    const state = {
        oshis: [...oshisMap.values()],
        tiers: tiersConfig.map(x=>({ ...x, oshis: collectOshiIds(document.getElementById('zone-'+x.id)) })),
        pool:  collectOshiIds(pool),
        perRow: parseInt(perRowEl?.value??'6',10),
        savedAt: Date.now(),
    };
    try { localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); updateSaveStatus(state.savedAt); } catch {}
}
function clearSavedState() { try{localStorage.removeItem(STORAGE_KEY);}catch{} saveStatus.textContent=''; saveStatus.classList.remove('visible'); }

async function restoreState() {
    let state; try{state=JSON.parse(localStorage.getItem(STORAGE_KEY)??'null');}catch{return false;}
    if(!state) return false;

    // Very old schema (kami/oshi keys)
    if(!state.tiers&&(state.kami!==undefined||state.oshi!==undefined)) {
        state.tiers=[];
        if(state.kami) state.tiers.push({id:'kami',name:'Kami',color:'#F08080',files:state.kami});
        if(state.oshi) state.tiers.push({id:'oshi',name:'Oshi',color:'#FFB347',files:state.oshi});
    }

    // Migrate pre-oshi schema (tiers had files[], no oshis key)
    if (!state.oshis) {
        state.oshis = [];
        const migrateFiles = files => (files??[]).map(fn => {
            const oshi = { id:'oshi-'+fn, name:'', photo:fn };
            state.oshis.push(oshi);
            return oshi.id;
        });
        state.tiers = (state.tiers??[]).map(x => ({ ...x, oshis: migrateFiles(x.files) }));
        state.pool  = migrateFiles(state.pool??[]);
    }

    if(!state.tiers?.length&&!state.pool?.length) return false;

    // Build oshisMap
    (state.oshis??[]).forEach(o => oshisMap.set(o.id, { ...o }));

    if(state.tiers?.length) {
        tiersConfig = state.tiers.map(({id,name,color})=>({id,name,color}));
        for(const tier of tiersConfig) {
            const {zone} = renderTierRow(tier);
            const saved  = state.tiers.find(x=>x.id===tier.id);
            for(const oshiId of (saved?.oshis??[])) {
                const oshi = oshisMap.get(oshiId);
                if(!oshi) continue;
                try { const url=await getBlobUrl(oshi.photo); appendPhoto(zone,makeOshiEl(oshi,url)); } catch {}
            }
        }
    }
    for(const oshiId of (state.pool??[])) {
        const oshi = oshisMap.get(oshiId);
        if(!oshi) continue;
        try { const url=await getBlobUrl(oshi.photo); appendPhoto(pool,makeOshiEl(oshi,url)); } catch {}
    }
    if(state.perRow){const r=document.querySelector(`input[name="perrow"][value="${state.perRow}"]`);if(r)r.checked=true;}
    if(state.savedAt) updateSaveStatus(state.savedAt);
    const total=(state.pool?.length??0)+(state.tiers?.reduce((s,x)=>s+(x.oshis?.length??0),0)??0);
    if(total>0) showToast(t('toastRestored', total, fmtTime(state.savedAt)));
    return true;
}
function updateSaveStatus(ts){saveStatus.textContent=t('savedAt',fmtTime(ts));saveStatus.classList.add('visible');}
function fmtTime(ts){return new Date(ts).toLocaleTimeString({th:'th-TH',en:'en-US',jp:'ja-JP'}[currentLang]||'th-TH',{hour:'2-digit',minute:'2-digit'});}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),4500);}

})();
</script>
